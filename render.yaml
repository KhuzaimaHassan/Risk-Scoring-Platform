services:
  - type: web
    name: risk-scoring-platform
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r requirements-run.txt && alembic upgrade head
    startCommand: python -m uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        value: '["*"]'
